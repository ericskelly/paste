<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Formatter</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
        font-family: monospace;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
        }

        header {
        padding: 12px 20px;
        background: #2d2d2d;
        border-bottom: 1px solid #444;
        font-size: 14px;
        color: #9cdcfe;
        }

        .panes {
        display: flex;
        flex: 1;
        overflow: hidden;
        }

        .pane {
        flex: 1;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #444;
        }

        .pane:last-child { border-right: none; }

        .pane-label {
        padding: 6px 12px;
        background: #252526;
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        border-bottom: 1px solid #333;
        }

        textarea, pre {
        flex: 1;
        padding: 16px;
        background: transparent;
        color: #d4d4d4;
        font-family: monospace;
        font-size: 13px;
        line-height: 1.6;
        border: none;
        outline: none;
        resize: none;
        overflow: auto;
        }

        pre { white-space: pre-wrap; word-break: break-word; }

        .toolbar {
        padding: 10px 20px;
        background: #2d2d2d;
        border-top: 1px solid #444;
        display: flex;
        gap: 10px;
        align-items: center;
        }

        button {
        padding: 6px 16px;
        background: #0e639c;
        color: #fff;
        border: none;
        border-radius: 3px;
        font-family: monospace;
        font-size: 13px;
        cursor: pointer;
        }

        button:hover { background: #1177bb; }
        button:disabled { background: #444; cursor: not-allowed; }

        #status {
        font-size: 12px;
        color: #888;
        }

        #status.error { color: #f48771; }
        #status.ok    { color: #89d185; }
    </style>
  </head>
  <body>
    <header>⚡ JSON Formatter — WASM</header>

    <div class="panes">
    <div class="pane">
        <div class="pane-label">Input</div>
        <textarea id="input" placeholder='Paste JSON here...'></textarea>
    </div>
    <div class="pane">
        <div class="pane-label">Output</div>
        <pre id="output"></pre>
    </div>
    </div>

    <div class="toolbar">
    <button id="btn" disabled>Loading WASM…</button>
    <span id="status">Initialising…</span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
